<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Chrysalis Time Tracker</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:system-ui,sans-serif; background:#1a1a2e; color:#e0e0e0; padding:20px; }
h1 { color:#e94560; margin-bottom:20px; }
.stats { display:flex; gap:20px; margin-bottom:30px; flex-wrap:wrap; }
.card { background:#16213e; padding:20px; border-radius:12px; flex:1; min-width:120px; text-align:center; }
.card h3 { color:#888; font-size:14px; }
.card .value { font-size:28px; font-weight:bold; color:#0f3460; margin-top:5px; }
table { width:100%; border-collapse:collapse; }
th { background:#0f3460; padding:10px; text-align:right; font-size:13px; }
td { padding:10px; border-bottom:1px solid #16213e; font-size:14px; }
tr:hover { background:#16213e40; }
.badge { display:inline-block; padding:2px 8px; border-radius:6px; font-size:12px; }
.badge-dev { background:#e94560; }
.badge-browser { background:#2196F3; }
.badge-terminal { background:#FF9800; }
.badge-uncat { background:#607D8B; }
.badge-idle { background:#9E9E9E; }
</style>
</head>
<body>
<h1>&#9202; Chrysalis Time Tracker</h1>
<div class="stats" id="stats"></div>
<table>
<thead><tr><th>زمان</th><th>مدت</th><th>پروسس</th><th>دسته</th></tr></thead>
<tbody id="activities"></tbody>
</table>
<script>
async function load() {
  const [acts, status] = await Promise.all([
    fetch('/api/activities?limit=100').then(r=>r.json()),
    fetch('/api/status').then(r=>r.json()),
  ]);
  document.getElementById('stats').innerHTML = `
    <div class="card"><h3>فعالیت‌ها</h3><div class="value">${status.total_activities}</div></div>
    <div class="card"><h3>زمان ثبت‌شده</h3><div class="value">${Math.round(status.total_tracked_sec/3600)}h</div></div>
    <div class="card"><h3>بک‌اند</h3><div class="value" style="font-size:16px">${status.backend}</div></div>
  `;
  const tbody = document.getElementById('activities');
  tbody.innerHTML = acts.map(a => {
    const dur = a.duration_sec ? Math.round(a.duration_sec/60) + 'm' : '&#9889;';
    const cat = a.category || '&mdash;';
    const catClass = cat === 'کدنویسی' ? 'badge-dev'
      : cat === 'مرورگر' ? 'badge-browser'
      : cat === 'ترمینال' ? 'badge-terminal'
      : cat === 'Idle' ? 'badge-idle'
      : 'badge-uncat';
    const time = a.start_ts ? a.start_ts.slice(11, 19) : '&mdash;';
    const proc = a.process || '&mdash;';
    return `<tr><td>${time}</td><td>${dur}</td><td>${proc}</td><td><span class="badge ${catClass}">${cat}</span></td></tr>`;
  }).join('');
}
load();
setInterval(load, 5000);
</script>
</body>
</html>
